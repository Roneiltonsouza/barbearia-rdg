<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RDG 2026 | Estilo e Tradição</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #e61e1e;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(26, 26, 26, 0.7); 
            --led-green: #2ecc71;
            --led-red: #e74c3c;
            --whatsapp: #25d366;
            --vibrant-orange: #ff4500;
        }

        #bg-dinamico {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; z-index: -1;
            transition: background-image 0.5s ease-in-out;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: white; overflow-x: hidden; padding-bottom: 120px; padding-top: 90px; }

        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 4%; border-bottom: 2px solid rgba(255, 255, 255, 0.1); 
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            height: 90px; position: fixed; top: 0; width: 100%; z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        .header-logo-container { display: flex; flex-direction: column; align-items: flex-start; }

        .logo-rdg { 
            font-size: 1.6rem; font-weight: 900; font-style: italic; display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
            background: linear-gradient(180deg, #000000 0%, var(--vibrant-orange) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-size: 0.7rem; font-weight: bold; letter-spacing: 1px;
            background: linear-gradient(180deg, #000000 0%, var(--vibrant-orange) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }

        .dev-gear { color: #fff; cursor: pointer; font-size: 1.1rem; opacity: 0.7; transition: 0.3s; }
        .dev-gear:hover { color: var(--vibrant-orange); opacity: 1; }

        .header-profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; object-fit: cover; }

        .status-panel { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 12px; border: 1px solid #444; min-width: 140px; }
        .status-text { font-size: 0.6rem; font-weight: 900; margin-bottom: 4px; text-align: center; }
        .led { width: 10px; height: 10px; border-radius: 50%; }
        .status-aberto .led { background: var(--led-green); box-shadow: 0 0 12px var(--led-green); animation: pulse-led 1.5s infinite; }
        .status-aberto .status-text { color: var(--led-green); }
        .status-fechado .led { background: var(--led-red); box-shadow: 0 0 5px var(--led-red); }

        .tabs { display: flex; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); position: sticky; top: 90px; z-index: 999; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: #bbb; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; transition: color 0.3s; text-shadow: 1px 1px 2px black; }
        .tab-btn.active { color: #fff; border-bottom: 3px solid #fff; }

        .whatsapp-fixed { position: fixed; bottom: 30px; right: 20px; background-color: var(--whatsapp); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 9999; text-decoration: none; }

        .main-logo-container { width: 100%; display: flex; justify-content: center; padding: 25px 0 10px 0; position: relative; z-index: 5; }
        .main-logo-img { max-width: 180px; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8)); }

        .content-section { display: none; padding: 10px 20px; animation: fadeIn 0.3s; position: relative; z-index: 5; }
        .content-section.active { display: block; }

        .price-card { background: var(--card-bg); padding: 18px; border-radius: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; border-left: 5px solid #fff; align-items: center; backdrop-filter: blur(5px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .price-value { color: #fff; font-weight: 800; font-size: 1.2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.98); padding: 25px; border-radius: 20px; border: 2px solid #fff; z-index: 1000001; max-height: 85vh; overflow-y: auto; backdrop-filter: blur(15px); }
        .admin-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000000; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .btn-update { width:100%; padding:15px; background:#fff; color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-bottom: 10px; text-transform: uppercase; }
        .btn-remove-aba { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 8px; margin-left: 5px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="bg-dinamico"></div>
    <div class="admin-overlay" id="admin-overlay" onclick="closeAdmin()"></div>

    <div id="admin-panel">
        <h3 style="margin:0 0 20px 0; color:#fff; text-align:center; text-transform:uppercase;">Painel RDG</h3>
        <button id="toggle-shop-btn" onclick="toggleShopStatus()" class="btn-update">Carregando...</button>
        
        <p style="font-size: 0.7rem; color: var(--vibrant-orange); margin: 5px 0;">PAPEL DE PAREDE (LINK):</p>
        <input type="text" id="input-bg-link" class="admin-input" placeholder="Link da imagem">
        
        <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
        <p style="font-size: 0.7rem; color: var(--vibrant-orange); margin: 5px 0;">GERENCIAR SERVIÇOS:</p>
        <div id="admin-servicos-container"></div>
        
        <button onclick="addNovoServico()" style="width:100%; background:#444; color:#fff; border:none; padding:12px; border-radius:10px; margin-top:10px; cursor:pointer;">+ ADICIONAR NOVO SERVIÇO</button>
        <button class="btn-update" onclick="updateAllData()" style="margin-top:15px;">SALVAR TUDO</button>
        <button onclick="closeAdmin()" style="width:100%; padding:10px; background:none; color:#888; border:none; margin-top:10px;">[ Sair ]</button>
    </div>

    <header>
        <div class="header-logo-container">
            <div class="logo-rdg">RDG <i class="fas fa-cog dev-gear" onclick="openAdmin()"></i></div>
            <span class="logo-subtitle">Estilo. 2026</span>
        </div>
        <div id="shop-status" class="status-panel">
            <span class="status-text" id="status-label">CARREGANDO...</span>
            <div class="led"></div>
        </div>
        <img src="https://i.ibb.co/HpPNnqqc/97a8aeeeeff0f0cffea0265f5fcfe2f41ac511f755c6b0d03d884867738a6947.jpg" class="header-profile-img" onclick="openFullscreenImg(this.src)">
    </header>

    <a href="https://api.whatsapp.com/send?phone=5588988088578&text=Olá%20RDG" class="whatsapp-fixed" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'precos')">TABELA</button>
        <button class="tab-btn" onclick="openTab(event, 'galeria')">MINHA NUVEM</button>
    </nav>

    <div class="main-logo-container">
        <img src="https://i.supaimg.com/6ce5a4d0-a717-4695-8947-6df309d71c4a/93281898-889c-402e-b747-4bb5c11bdc20.png" class="main-logo-img">
    </div>

    <section id="precos" class="content-section active"></section>

    <section id="galeria" class="content-section">
        <p style="text-align: center; font-size: 0.7rem; color: #888; margin-bottom: 15px;">Suas fotos são privadas e só você pode vê-las.</p>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="document.getElementById('upload-input').click()" style="flex: 1; background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold;"><i class="fas fa-file-upload"></i> GALERIA</button>
            <button onclick="document.getElementById('camera-input').click()" style="flex: 1; background: var(--vibrant-orange); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold;"><i class="fas fa-camera"></i> CÂMERA</button>
        </div>
        <div id="gallery-display" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        <input type="file" id="upload-input" style="display:none"><input type="file" id="camera-input" capture="environment" style="display:none">
    </section>

    <script>
        const firebaseConfig = { apiKey: "AIzak4N87EPBGvSByz6amrylTnV0wzbZ8CfZAlj", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ID ÚNICO PRIVADO POR CLIENTE
        const myId = localStorage.getItem('rdg_client_id') || ('c' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('rdg_client_id', myId);
        
        let localServicos = [];
        let shopStatus = false;

        function openAdmin() { if(prompt("Chave Admin:") === "netchaveapi") { document.getElementById('admin-panel').style.display = "block"; document.getElementById('admin-overlay').style.display = "block"; } }
        function closeAdmin() { document.getElementById('admin-panel').style.display = "none"; document.getElementById('admin-overlay').style.display = "none"; }

        // SINCRONIZAÇÃO GERAL (TABELA E STATUS)
        database.ref('rdg_v2026_data').on('value', snapshot => {
            const data = snapshot.val() || {};
            shopStatus = data.aberto;
            if(data.bg) {
                document.getElementById('bg-dinamico').style.backgroundImage = `url('${data.bg}')`;
                document.getElementById('input-bg-link').value = data.bg;
            }
            const btn = document.getElementById('toggle-shop-btn'), panel = document.getElementById('shop-status'), label = document.getElementById('status-label');
            if(shopStatus) {
                panel.className = "status-panel status-aberto"; label.innerText = "BARBEARIA RDG ABERTA";
                btn.innerText = "FECHAR BARBEARIA"; btn.style.background = "#e74c3c"; btn.style.color = "#fff";
            } else {
                panel.className = "status-panel status-fechado"; label.innerText = "BARBEARIA RDG FECHADA";
                btn.innerText = "ABRIR BARBEARIA"; btn.style.background = "#2ecc71"; btn.style.color = "#000";
            }
            localServicos = data.servicos ? Object.values(data.servicos) : [];
            renderTabela();
            renderAdmin();
        });

        function renderTabela() {
            const container = document.getElementById('precos');
            container.innerHTML = "";
            localServicos.forEach(s => {
                container.innerHTML += `<div class="price-card"><div><strong>${s.n}</strong></div><div class="price-value">${s.p}</div></div>`;
            });
        }

        function renderAdmin() {
            const container = document.getElementById('admin-servicos-container');
            container.innerHTML = "";
            localServicos.forEach((s, index) => {
                container.innerHTML += `
                    <div style="display:flex; gap:5px; margin-bottom:8px; align-items:center;">
                        <input type="text" class="admin-input" style="width:50%; margin-bottom:0;" value="${s.n}" onchange="localServicos[${index}].n = this.value">
                        <input type="text" class="admin-input" style="width:30%; margin-bottom:0;" value="${s.p}" onchange="localServicos[${index}].p = this.value">
                        <button class="btn-remove-aba" onclick="removerServico(${index})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        function addNovoServico() {
            localServicos.push({ n: "Novo", p: "R$ 00" });
            renderAdmin();
        }

        function removerServico(i) {
            localServicos.splice(i, 1);
            renderAdmin();
        }

        function updateAllData() {
            database.ref('rdg_v2026_data').update({
                bg: document.getElementById('input-bg-link').value,
                servicos: localServicos
            }).then(() => { alert("RDG Atualizado!"); closeAdmin(); });
        }

        function toggleShopStatus() { database.ref('rdg_v2026_data/aberto').set(!shopStatus); }

        function openTab(evt, tabName) {
            document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(tabName === 'galeria') loadGallery();
        }

        // LÓGICA DA NUVEM PRIVADA: SÓ PUXA FOTOS DO 'myId' DO CLIENTE ATUAL
        function loadGallery() {
            database.ref('nuvem_privada/' + myId).on('value', snapshot => {
                const display = document.getElementById('gallery-display'); display.innerHTML = '';
                snapshot.forEach(child => {
                    const img = document.createElement('img'); img.src = child.val().image;
                    img.style = "width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; border: 1px solid #333;";
                    img.onclick = () => openFullscreenImg(child.val().image, child.key);
                    display.prepend(img);
                });
            });
        }

        document.getElementById('upload-input').onchange = handleFile;
        document.getElementById('camera-input').onchange = handleFile;
        function handleFile(e) {
            const reader = new FileReader();
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
                reader.onload = ev => database.ref('nuvem_privada/' + myId).push({ image: ev.target.result });
            }
        }

        function openFullscreenImg(src, fotoId = null) { 
            const viewer = document.createElement('div');
            viewer.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(10px);";
            if(fotoId) {
                const del = document.createElement('button');
                del.innerHTML = '<i class="fas fa-trash"></i> APAGAR MINHA FOTO';
                del.style = "margin-bottom:20px; background:var(--led-red); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold;";
                del.onclick = (e) => { e.stopPropagation(); if(confirm("Deseja apagar sua foto da nuvem?")) { database.ref('nuvem_privada/' + myId + '/' + fotoId).remove(); viewer.remove(); } };
                viewer.appendChild(del);
            }
            const img = document.createElement('img'); img.src = src; img.style = "max-width:90%; max-height:80%; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,1);";
            viewer.onclick = () => viewer.remove(); viewer.appendChild(img); document.body.appendChild(viewer);
        }
    </script>
</body>
</html>
